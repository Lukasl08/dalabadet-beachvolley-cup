/* === Designsystem (inbakat) === */
/* Dalabadet Beachvolley Cup — Webfonts
   All three families are available on Google Fonts, so no substitution was
   needed against the brief.
     - Bricolage Grotesque  → display / headings (uppercase, tight kerning)
     - Inter                → body
     - Spline Sans Mono     → numbers, times, results ("match-clock" feel) */

@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap');

/* Dalabadet Beachvolley Cup — Color tokens
   A muted Swedish-summer-beach palette: pale sand, dampened Baltic blue,
   beach grass, and a single strong royal-blue (kungsblå) accent reserved for
   the most important action (registration). */

:root {
  /* --- Base palette --- */
  --sand:       #EFE3C4; /* page background, light surfaces */
  --sand-deep:  #DCC79A; /* cards, dividers, secondary surfaces */
  --sea:        #2E6F80; /* primary accent, headings */
  --sea-deep:   #1B4750; /* dark text, footer / CTA backgrounds */
  --dune:       #6E8B57; /* beach grass, secondary accent, palm detail */
  --royal:      #2C4BD4; /* the ONLY strong color — kungsblå, CTA buttons, used sparingly */
  --ink:        #26241F; /* body text */
  --white:      #FBF8F1; /* cards, button text on dark ground */

  /* --- Tints / states (derived, harmonious) --- */
  --sea-soft:    #4D8593; /* sea hover / lighter sea */
  --royal-deep:  #1E36A6; /* royal pressed / darker */
  --danger:      #C0392B; /* form error / validation only */
  --dune-soft:   #88A271; /* dune hover */
  --sand-hair:   #C9B488; /* hairline borders on sand */
  --ink-60:      rgba(38, 36, 31, 0.62); /* muted body text */
  --white-70:    rgba(251, 248, 241, 0.72); /* muted text on dark */

  /* --- Faded tint ramps ---
     Each hue ships as a 3-step ramp toward the sand, lightest + most faded
     first. Use for soft section washes, hover fills, badges and quiet panels.
     tint-3 sits closest to the base color. */
  --sea-tint-1:   #DCE6E8; /* @kind color */
  --sea-tint-2:   #B6CCD1; /* @kind color */
  --sea-tint-3:   #8FB0B7; /* @kind color */

  --dune-tint-1:  #E4E9DC; /* @kind color */
  --dune-tint-2:  #C8D3BA; /* @kind color */
  --dune-tint-3:  #A6B893; /* @kind color */

  --royal-tint-1: #DEE2F7; /* @kind color */
  --royal-tint-2: #BAC3EF; /* @kind color */
  --royal-tint-3: #8E9CE4; /* @kind color */

  --sand-tint-1:  #FAF6EC; /* @kind color */
  --sand-tint-2:  #F4ECD6; /* @kind color */
  --sand-tint-3:  #E7D9B6; /* @kind color */

  --ink-tint-1:   #BAB7AF; /* @kind color */
  --ink-tint-2:   #8A8780; /* @kind color */
  --ink-tint-3:   #57544D; /* @kind color */

  --danger-tint-1:#F0D5D1; /* @kind color */
  --danger-tint-2:#E0A89F; /* @kind color */
  --danger-tint-3:#CF6E61; /* @kind color */

  /* --- Semantic aliases --- */
  --bg-page:        var(--sand);
  --bg-raised:      var(--white);
  --bg-sunk:        var(--sand-deep);
  --bg-dark:        var(--sea-deep);

  --text-heading:   var(--sea);
  --text-body:      var(--ink);
  --text-muted:     var(--ink-60);
  --text-on-dark:   var(--white);
  --text-on-dark-muted: var(--white-70);

  --accent:         var(--sea);
  --accent-grass:   var(--dune);
  --action:         var(--royal);   /* primary CTA */
  --action-hover:   var(--royal-deep);

  --border-hair:    var(--sand-hair);
  --border-on-dark: rgba(251, 248, 241, 0.18);
}

/* Dalabadet Beachvolley Cup — Typography tokens */

:root {
  /* --- Families --- */
  --font-display: 'Bricolage Grotesque', 'Arial Narrow', sans-serif;
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:    'Spline Sans Mono', ui-monospace, 'SF Mono', monospace;

  /* --- Weights --- */
  --fw-regular: 400; /* @kind font */
  --fw-medium:  500; /* @kind font */
  --fw-semibold:600; /* @kind font */
  --fw-bold:    700; /* @kind font */
  --fw-black:   800; /* @kind font */

  /* --- Type scale (fluid-ish, px) --- */
  --fs-hero:    clamp(3rem, 8vw, 6.5rem); /* @kind font */
  --fs-display: 3.25rem;  /* @kind font */
  --fs-h1:      2.5rem;   /* @kind font */
  --fs-h2:      1.875rem; /* @kind font */
  --fs-h3:      1.375rem; /* @kind font */
  --fs-lead:    1.25rem;  /* @kind font */
  --fs-body:    1.0625rem;/* @kind font */
  --fs-sm:      0.9375rem;/* @kind font */
  --fs-xs:      0.8125rem;/* @kind font */

  /* --- Line heights --- */
  --lh-tight:   1.02; /* @kind font */
  --lh-snug:    1.18; /* @kind font */
  --lh-body:    1.6; /* @kind font */

  /* --- Letter spacing --- */
  --ls-display: -0.02em; /* @kind font */
  --ls-label:   0.08em;  /* @kind font */
  --ls-mono:    0.01em;  /* @kind font */

  /* --- Semantic --- */
  --text-display-spacing: var(--ls-display);
}

/* Base element defaults — opt-in by linking styles.css */
:root {
  --type-heading-transform: uppercase;
}

/* Dalabadet Beachvolley Cup — Spacing & layout tokens
   8px base rhythm. */

:root {
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10: 128px;

  /* Section vertical rhythm */
  --section-pad-y: clamp(var(--space-8), 9vw, var(--space-10));

  /* Content widths */
  --maxw-prose:   62ch;
  --maxw-content: 1120px;
  --maxw-narrow:  720px;

  /* Page gutter */
  --gutter: clamp(var(--space-5), 5vw, var(--space-8));
}

/* Dalabadet Beachvolley Cup — Effects: radii, borders, shadows, motion
   Soft, low-contrast surfaces. Shadows are warm and gentle (sun on sand),
   never the cold blue/black drop-shadows of generic web UI. */

:root {
  /* --- Corner radii --- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   14px;  /* default cards, inputs */
  --radius-lg:   22px;  /* feature panels */
  --radius-pill: 999px; /* tags, chips */
  /* Playful organic "beach-pebble" corner — used on buttons so they feel
     hand-shaped rather than a plain pill. Gently asymmetric, all corners soft. */
  --radius-pebble: 14px 22px 16px 26px / 26px 16px 24px 14px;

  /* --- Borders --- */
  --border-width: 1px; /* @kind other */
  --border-card:  1px solid var(--border-hair); /* @kind other */

  /* --- Shadows (warm, soft) --- */
  --shadow-sm:  0 1px 2px rgba(38, 36, 31, 0.06);
  --shadow-md:  0 6px 18px rgba(38, 36, 31, 0.10);
  --shadow-lg:  0 18px 44px rgba(27, 71, 80, 0.16);
  /* pressed-into-sand inset for active button */
  --shadow-press: inset 0 2px 6px rgba(38, 36, 31, 0.22);

  /* --- Motion --- */
  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */
  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */
  --dur-fast:   140ms; /* @kind other */
  --dur-base:   240ms; /* @kind other */
  --dur-slow:   600ms; /* @kind other */
}

/* Dalabadet Beachvolley Cup — Base element styles & helpers
   Light reset + sensible defaults that map elements onto the tokens. */

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg-page);
  color: var(--text-body);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  color: var(--text-heading);
  text-transform: uppercase;
  letter-spacing: var(--ls-display);
  line-height: var(--lh-tight);
  font-weight: var(--fw-bold);
  margin: 0 0 var(--space-4);
  text-wrap: balance;
}

p { margin: 0 0 var(--space-4); }
p:last-child { margin-bottom: 0; }

a { color: var(--sea); text-decoration: none; }
a:hover { color: var(--sea-soft); }

/* Numbers / times / results */
.ds-mono,
time, .ds-time, .ds-result {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: var(--ls-mono);
}

/* Uppercase eyebrow / label */
.ds-eyebrow {
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: var(--ls-label);
  font-size: var(--fs-xs);
  font-weight: var(--fw-medium);
  color: var(--dune);
}

/* Layout helper */
.ds-container {
  width: 100%;
  max-width: var(--maxw-content);
  margin-inline: auto;
  padding-inline: var(--gutter);
}

/* Button interaction states (the .ds-btn class is set by the Button component).
   Press = sink 2px + scale 97% ("pressed into the sand"). */
.ds-btn:not(:disabled):hover[data-variant="primary"]   { background: var(--action-hover); }
.ds-btn:not(:disabled):hover[data-variant="secondary"]  { background: rgba(46,111,128,0.08); }
.ds-btn:not(:disabled):hover[data-variant="ghost"]      { background: rgba(46,111,128,0.08); }
.ds-btn:not(:disabled):active {
  transform: translateY(2px) scale(0.97);
  box-shadow: var(--shadow-press);
}
.ds-btn:focus-visible {
  outline: 2px solid var(--sea);
  outline-offset: 2px;
}

/* Form controls focus */
.ds-input:focus {
  border-color: var(--sea) !important;
  box-shadow: 0 0 0 3px rgba(46,111,128,0.16);
}
.ds-input::placeholder { color: var(--ink-60); }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

<style>
  html { scroll-behavior: smooth; }
  body { background: var(--sand); overflow-x: hidden; }
  ::selection { background: var(--royal); color: var(--white); }

  .navlink { position: relative; transition: color .2s ease; }
  .navlink::after {
    content: ""; position: absolute; left: 0; right: 100%; bottom: -2px; height: 2px;
    background: var(--royal); transition: right .28s var(--ease-out);
  }
  .navlink:hover { color: var(--royal); }
  .navlink:hover::after { right: 0; }

  /* ---- Scroll reveal (content visible by default; only hides when motion is welcome) ---- */
  @media (prefers-reduced-motion: no-preference) {
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .9s var(--ease-out), transform .9s var(--ease-out); }
    .reveal.in { opacity: 1; transform: none; }
    .reveal-d1 { transition-delay: .08s; }
    .reveal-d2 { transition-delay: .16s; }
    .reveal-d3 { transition-delay: .24s; }
    .reveal-d4 { transition-delay: .32s; }
  }

  /* ---- Signature ball-arc draw-in ---- */
  .ball-arc { stroke-dashoffset: 0; }
  .ball-dot { transform-box: fill-box; transform-origin: center; }
  @media (prefers-reduced-motion: no-preference) {
    .ready .ball-arc { stroke-dasharray: 1500; stroke-dashoffset: 1500; animation: arcDraw 1.9s var(--ease-out) .35s forwards; }
    .ready .ball-dot { opacity: 0; animation: ballPop .55s var(--ease-out) 2.0s forwards; }
    .ready .palm { opacity: 0; animation: palmFade 1.4s ease .7s forwards; }
    .ready .hero-rise { opacity: 0; transform: translateY(34px); animation: heroRise 1s var(--ease-out) forwards; }
    .ready .hero-rise.hr1 { animation-delay: .25s; }
    .ready .hero-rise.hr2 { animation-delay: .42s; }
    .ready .hero-rise.hr3 { animation-delay: .58s; }
    .ready .hero-rise.hr4 { animation-delay: .74s; }
  }
  @keyframes arcDraw { to { stroke-dashoffset: 0; } }
  @keyframes ballPop { 0% { opacity: 0; transform: scale(.2); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes palmFade { to { opacity: .5; } }
  @keyframes heroRise { to { opacity: 1; transform: none; } }

  /* ---- Ambient, very slow drift on decorative layers (gentle, gated) ---- */
  @media (prefers-reduced-motion: no-preference) {
    .drift-slow { animation: drift 14s ease-in-out infinite alternate; }
    .drift-slower { animation: drift 22s ease-in-out infinite alternate; }
    .bob { animation: bob 7s ease-in-out infinite alternate; }
  }
  @keyframes drift { from { transform: translateX(-12px); } to { transform: translateX(12px); } }
  @keyframes bob { from { transform: translateY(0) rotate(-3deg); } to { transform: translateY(-18px) rotate(4deg); } }

  /* ---- Scroll cue ---- */
  .scrollcue { animation: cue 2.2s ease-in-out infinite; }
  @keyframes cue { 0%,100% { transform: translateY(0); opacity: .9; } 50% { transform: translateY(7px); opacity: .45; } }
  @media (prefers-reduced-motion: reduce) { .scrollcue { animation: none; } }

  /* ---- Loading splash ---- */
  #splash {
    position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 26px;
    background: var(--sand);
    transition: opacity .7s ease, visibility .7s ease;
  }
  #splash.gone { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-word { font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: -.02em; font-size: clamp(1.6rem, 5vw, 2.4rem); color: var(--sea-deep); line-height: .95; text-align: center; }
  .splash-sub { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .28em;
    font-size: .68rem; color: var(--royal); }
  .splash-ball { width: 56px; height: 56px; }
  @media (prefers-reduced-motion: no-preference) {
    .splash-ball circle.s-ball { transform-box: fill-box; transform-origin: center; animation: spin 1.4s linear infinite; }
    .splash-track { stroke-dasharray: 150; stroke-dashoffset: 150; animation: arcDraw 1.2s var(--ease-out) forwards; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- FAQ accordion ---- */
  .faq-item { border-bottom: 1px solid var(--sand-hair); }
  .faq-q { width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: var(--space-5) 0; font-family: var(--font-display); text-transform: uppercase;
    letter-spacing: -.01em; font-weight: 700; font-size: var(--fs-h3); color: var(--sea-deep); }
  .faq-q:hover { color: var(--royal); }
  .faq-icon { flex: none; width: 30px; height: 30px; border-radius: 999px; border: 1.5px solid var(--sand-hair);
    display: grid; place-items: center; transition: transform .35s var(--ease-out), background .25s, border-color .25s; color: var(--sea); }
  .faq-item[data-open="true"] .faq-icon { transform: rotate(45deg); background: var(--royal); border-color: var(--royal); color: var(--white); }
  .faq-a { overflow: hidden; height: 0; transition: height .4s var(--ease-out); }
  .faq-a-inner { padding: 0 0 var(--space-5); color: var(--text-body); max-width: 60ch; }

  /* ---- Card hover lift (Why) ---- */
  .lift { transition: transform .4s var(--ease-out), box-shadow .4s var(--ease-out); }
  @media (prefers-reduced-motion: no-preference) {
    .lift:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }
  }

  .topfade { background: var(--sand); }

  /* ---- Scroll progress bar ---- */
  #scrollbar {
    position: fixed; top: 0; left: 0; height: 3px; width: 0%;
    background: linear-gradient(90deg, var(--sea), var(--royal));
    z-index: 300; transition: width .08s linear; pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) { #scrollbar { transition: none; } }
</style>

<script type="text/babel" data-presets="react">
/* === site/Stats.jsx (inbakat) === */
// Stats - a short band of honest, punchy facts that count up the first time
// they scroll into view. Numbers only where they're true (no invented figures):
// one full day, four per team, ~7 hours of play, 100% summer feeling.
function useCountUp(target, suffix, run) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    if (!run) return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) { setVal(target); return; }
    let raf, start;
    const dur = 1400;
    const tick = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(target * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [run, target]);
  return `${val}${suffix || ''}`;
}

function StatTile({ value, suffix, label, sub, run }) {
  const shown = useCountUp(value, suffix, run);
  return (
    <div className="stat-tile">
      <div className="stat-num ds-mono">{shown}</div>
      <div className="stat-label">{label}</div>
      <div className="stat-sub">{sub}</div>
    </div>
  );
}

function Stats() {
  const ref = React.useRef(null);
  const [run, setRun] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    if (!('IntersectionObserver' in window)) { setRun(true); return; }
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => { if (e.isIntersecting) { setRun(true); io.disconnect(); } });
    }, { threshold: 0.35 });
    io.observe(el);
    return () => io.disconnect();
  }, []);

  const tiles = [
    { value: 1, suffix: '', label: 'Hel dag', sub: 'Sol från morgon till kväll' },
    { value: 4, suffix: '', label: 'Spelare per lag', sub: 'Samla gänget' },
    { value: 7, suffix: 'h', label: 'Bollspel', sub: 'Från första serve till final' },
    { value: 100, suffix: '%', label: 'Sommarkänsla', sub: 'Garanterat skratt i sanden' },
  ];

  return (
    <section ref={ref} className="bv-stats" aria-label="Snabba fakta">
      <div className="ds-container">
        <div className="stat-grid">
          {tiles.map((t, i) => (
            <div className={`reveal reveal-d${i + 1}`} key={t.label}>
              <StatTile {...t} run={run} />
            </div>
          ))}
        </div>
      </div>

      <style>{`
        .bv-stats { background: var(--sand); padding: var(--space-7) 0; border-top: 1px solid var(--sand-hair); border-bottom: 1px solid var(--sand-hair); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-6); }
        .stat-tile { text-align: center; padding: 0 var(--space-3); position: relative; }
        .stat-grid > div:not(:last-child) .stat-tile::after {
          content: ""; position: absolute; right: calc(var(--space-6) / -2); top: 10%; bottom: 10%;
          width: 1px; background: var(--sand-hair);
        }
        .stat-num { font-size: clamp(2.6rem, 6vw, 4.2rem); font-weight: 600; line-height: 1; color: var(--royal); }
        .stat-label { font-family: var(--font-display); text-transform: uppercase; font-weight: 700; letter-spacing: -0.01em; font-size: var(--fs-h3); color: var(--sea-deep); margin-top: var(--space-3); }
        .stat-sub { color: var(--text-muted); font-size: var(--fs-sm); margin-top: 4px; }
        @media (max-width: 720px) {
          .stat-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-7) var(--space-5); }
          .stat-grid > div:nth-child(odd) .stat-tile::after { content: none; }
        }
      `}</style>
    </section>
  );
}

</script>

    // can react - the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability - if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {

      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag - ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char - so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings - map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick - checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor - curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts - a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

    vars['--royal'] = accent;
    vars['--royal-deep'] = ACCENT_DEEP[accent.toLowerCase()] || accent;

    const texture = t.texture === 'prickar' ? TEXTURE_DOTS : t.texture === 'vagor' ? TEXTURE_WAVES : t.texture === 'kornig' ? TEXTURE_GRAIN : '';

    const rules = [];

    // --- background texture ---
    if (texture) rules.push(`body{background-image:${texture};${t.texture === 'prickar' ? 'background-size:28px 28px;' : t.texture === 'vagor' ? 'background-size:120px 40px;' : ''}}`);

    // --- section accent bars ---
    if (!t.sectionLines) rules.push('#schema > div[aria-hidden="true"]:first-child, #anmalan > div[aria-hidden="true"]:first-child{display:none;}');

    // --- motion ---
    if (t.motion === 'lugn') rules.push('.drift-slow,.drift-slower,.bob{animation:none!important;}');
    if (t.motion === 'livlig') rules.push('.drift-slow{animation-duration:8s!important;}.drift-slower{animation-duration:12s!important;}.bob{animation-duration:4s!important;}');

    // --- button style ---
    if (t.buttonStyle === 'kontur') rules.push('.ds-btn[data-variant="primary"]{background:transparent!important;color:var(--royal)!important;box-shadow:inset 0 0 0 2px var(--royal)!important;}');
    if (t.buttonStyle === 'mjuk') rules.push('.ds-btn[data-variant="primary"]{background:color-mix(in srgb, var(--royal) 16%, transparent)!important;color:var(--royal-deep)!important;box-shadow:none!important;}');

    // --- uppercase headings ---
    if (t.uppercaseHeadings) rules.push('h1,h2,h3{text-transform:uppercase;letter-spacing:-0.01em;}');

    // --- hero ---
    rules.push(`#top{min-height:${TWEAK_HEROH[t.heroHeight] || '100vh'}!important;}`);
    if (t.heroAlign === 'center') rules.push('#top .ds-container{text-align:center;}#top .ds-container .hero-rise{margin-left:auto;margin-right:auto;}#top .hr4{justify-content:center;}');
    if (t.heroGlow) rules.push('#top::after{content:"";position:absolute;left:50%;top:34%;width:min(70vw,720px);height:min(70vw,720px);transform:translate(-50%,-50%);background:radial-gradient(circle, color-mix(in srgb, var(--dune-soft) 40%, transparent) 0%, transparent 62%);pointer-events:none;z-index:0;}');
    if (!t.heroBadge) rules.push('#top .hr1{display:none!important;}');
    if (!t.scrollCue) rules.push('#top a[aria-label="Scrolla ner"]{display:none!important;}');

    // --- why section ---
    if (t.whyLayout === 'en') rules.push('.why-list{grid-template-columns:1fr!important;}.why-item{max-width:60ch;}');
    if (!t.whyNumbers) rules.push('.why-num,.why-rule{display:none!important;}.why-index{margin-bottom:0!important;}');
    if (!t.whyUnderline) rules.push('.why-ul{display:none!important;}');
    if (t.accentEverywhere) rules.push('.ds-eyebrow{color:var(--royal)!important;}.why-num{color:var(--royal)!important;}.why-ul path{stroke:var(--royal)!important;}');

    // --- schedule ---
    if (!t.schedRail) rules.push('#schema div[aria-hidden="true"][style*="width: 2px"], #schema div[aria-hidden="true"][style*="width:2px"]{display:none!important;}');
    if (t.schedDotsFilled) rules.push('.sched-dot{background:var(--royal)!important;border-color:var(--royal)!important;}');

    let el = document.getElementById('tweak-overrides');
    if (!el) { el = document.createElement('style'); el.id = 'tweak-overrides'; document.head.appendChild(el); }
    el.textContent = buildVarBlock(vars) + '\n' + rules.join('\n');

    window.__parallaxMul = t.motion === 'lugn' ? 0 : t.motion === 'livlig' ? 1.8 : 1;

    const setShown = (id, shown) => { const s = document.getElementById(id); if (s) s.style.display = shown ? '' : 'none'; };
    setShown('schema', t.showSchema);
    setShown('plats', t.showPlats);
    setShown('pris', t.showPris);
    setShown('folj', t.showFolj);
    setShown('fragor', t.showFaq);
  });

  const moodOptions = Object.keys(TWEAK_MOODS).map((k) => ({ value: k, label: TWEAK_MOODS[k].label }));

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Stämning & färg" />
      <TweakSelect label="Färgstämning" value={t.mood} options={moodOptions} onChange={(v) => setTweak('mood', v)} />
      <TweakColor label="CTA-accent" value={t.accent} options={TWEAK_ACCENTS.map((a) => a.c)} onChange={(v) => setTweak('accent', v)} />
      <TweakToggle label="Accentfärg överallt" value={t.accentEverywhere} onChange={(v) => setTweak('accentEverywhere', v)} />

      <TweakSection label="Layout & rytm" />
      <TweakRadio label="Innehållsbredd" value={t.contentWidth} options={['smal', 'normal', 'bred']} onChange={(v) => setTweak('contentWidth', v)} />
      <TweakRadio label="Sektionsavstånd" value={t.sectionSpace} options={['kompakt', 'normal', 'luftig']} onChange={(v) => setTweak('sectionSpace', v)} />
      <TweakToggle label="Accentlinjer på sektioner" value={t.sectionLines} onChange={(v) => setTweak('sectionLines', v)} />

      <TweakSection label="Form & rörelse" />
      <TweakRadio label="Hörn" value={t.corners} options={['skarpa', 'mjuka', 'runda']} onChange={(v) => setTweak('corners', v)} />
      <TweakRadio label="Skuggdjup" value={t.shadow} options={['platt', 'mjuk', 'djup']} onChange={(v) => setTweak('shadow', v)} />
      <TweakRadio label="Rörelse" value={t.motion} options={['lugn', 'normal', 'livlig']} onChange={(v) => setTweak('motion', v)} />
      <TweakRadio label="Knappstil" value={t.buttonStyle} options={['fylld', 'kontur', 'mjuk']} onChange={(v) => setTweak('buttonStyle', v)} />

      <TweakSection label="Typografi" />
      <TweakRadio label="Rubrikskala" value={t.typeScale} options={['stram', 'normal', 'stor']} onChange={(v) => setTweak('typeScale', v)} />
      <TweakRadio label="Brödtext" value={t.bodySize} options={['liten', 'normal', 'stor']} onChange={(v) => setTweak('bodySize', v)} />
      <TweakToggle label="Versala rubriker" value={t.uppercaseHeadings} onChange={(v) => setTweak('uppercaseHeadings', v)} />

      <TweakSection label="Hero" />
      <TweakRadio label="Höjd" value={t.heroHeight} options={['kort', 'full', 'hog']} onChange={(v) => setTweak('heroHeight', v)} />
      <TweakRadio label="Justering" value={t.heroAlign} options={['vanster', 'center']} onChange={(v) => setTweak('heroAlign', v)} />
      <TweakToggle label="Sol-glow" value={t.heroGlow} onChange={(v) => setTweak('heroGlow', v)} />
      <TweakToggle label="Datum-pill" value={t.heroBadge} onChange={(v) => setTweak('heroBadge', v)} />
      <TweakToggle label="Scrolla-pil" value={t.scrollCue} onChange={(v) => setTweak('scrollCue', v)} />

      <TweakSection label="Sektion: Varför delta" />
      <TweakRadio label="Kolumner" value={t.whyLayout} options={['en', 'tva']} onChange={(v) => setTweak('whyLayout', v)} />
      <TweakToggle label="Numrering" value={t.whyNumbers} onChange={(v) => setTweak('whyNumbers', v)} />
      <TweakToggle label="Handritade streck" value={t.whyUnderline} onChange={(v) => setTweak('whyUnderline', v)} />

      <TweakSection label="Sektion: Schema" />
      <TweakToggle label="Tidslinje-räls" value={t.schedRail} onChange={(v) => setTweak('schedRail', v)} />
      <TweakToggle label="Fyllda prickar" value={t.schedDotsFilled} onChange={(v) => setTweak('schedDotsFilled', v)} />

      <TweakSection label="Bakgrund" />
      <TweakSelect label="Textur" value={t.texture}
        options={[{ value: 'ingen', label: 'Ingen' }, { value: 'vagor', label: 'Vågor' }, { value: 'prickar', label: 'Prickar' }, { value: 'kornig', label: 'Kornig' }]}
        onChange={(v) => setTweak('texture', v)} />

      <TweakSection label="Visa / dölj sektioner" />
      <TweakToggle label="Schema" value={t.showSchema} onChange={(v) => setTweak('showSchema', v)} />
      <TweakToggle label="Plats" value={t.showPlats} onChange={(v) => setTweak('showPlats', v)} />
      <TweakToggle label="Pris" value={t.showPris} onChange={(v) => setTweak('showPris', v)} />
      <TweakToggle label="Följ oss" value={t.showFolj} onChange={(v) => setTweak('showFolj', v)} />
      <TweakToggle label="Vanliga frågor" value={t.showFaq} onChange={(v) => setTweak('showFaq', v)} />
    </TweaksPanel>
  );
}
window.Tweaks = Tweaks;
</script>

<script type="text/babel" data-presets="react">
  function App() {
    const scrollToForm = React.useCallback(() => {
      const el = document.getElementById('anmalan');
      if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });
    }, []);
    return (
      <React.Fragment>
        <window.Nav onRegister={scrollToForm} />
        <main>
          <window.Hero onRegister={scrollToForm} />
          <window.Marquee />
          <window.Why />
          <window.Stats />
          <window.Schedule />
          <window.Moment onRegister={scrollToForm} />
          <window.Prize />
          <window.Gallery />
          <window.Location />
          <window.Faq />
          <window.Follow />
          <window.Registration onRegister={scrollToForm} />
        </main>
        <window.Footer />
        <window.Tweaks />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // ---- Reveal on scroll ----
  function wireReveals() {
    const els = document.querySelectorAll('.reveal:not(.in)');
    if (!('IntersectionObserver' in window)) { els.forEach(e => e.classList.add('in')); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((en) => {
        if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    els.forEach((e) => io.observe(e));
  }

  // ---- Parallax (subtle) + scroll progress bar ----
  let ticking = false;
  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const y = window.scrollY;
      document.querySelectorAll('[data-parallax]').forEach((el) => {
        const sp = (parseFloat(el.getAttribute('data-parallax')) || 0) * (window.__parallaxMul ?? 1);
        el.style.transform = `translate3d(0, ${y * sp}px, 0)`;
      });
      const bar = document.getElementById('scrollbar');
      if (bar) {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = (max > 0 ? (y / max) * 100 : 0) + '%';
      }
      ticking = false;
    });
  }

  // Wire up after first paint of the React tree.
  requestAnimationFrame(() => {
    setTimeout(() => {
      wireReveals();
      // re-scan once more in case sections mounted late
      setTimeout(wireReveals, 400);
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!reduce) window.addEventListener('scroll', onScroll, { passive: true });
      document.body.classList.add('ready');
    }, 60);
  });

  // ---- Splash dismiss ----
  function dismissSplash() {
    const s = document.getElementById('splash');
    if (s) s.classList.add('gone');
    setTimeout(() => { if (s) s.remove(); }, 800);
  }
  if (document.readyState === 'complete') setTimeout(dismissSplash, 700);
  else window.addEventListener('load', () => setTimeout(dismissSplash, 600));
  // hard fallback
  setTimeout(dismissSplash, 2600);
</script>
</body>
</html>
